<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="imagine.pageTitle">Grok2API - Imagine 瀑布流</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/static/common/css/common.css?v=1.6.2" rel="stylesheet">
  <link href="/static/function/css/imagine.css?v=1.6.2" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <main class="flex-1 container mx-auto max-w-5xl px-6 py-8 fade-in">
    <div class="space-y-6">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight" data-i18n="imagine.title">Imagine 瀑布流</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm" data-i18n="imagine.subtitle">通过 WebSocket 持续生成图片，实时展示 base64 瀑布流。</p>
        </div>

        <div class="h-px bg-[var(--border)]"></div>

        <div class="imagine-mode-bar">
          <div class="imagine-mode-switch" role="group">
            <button class="imagine-mode-btn active" data-imagine-mode="generate" data-i18n="imagine.modeGenerate">生成</button>
            <button class="imagine-mode-btn" data-imagine-mode="edit" data-i18n="imagine.modeEdit">编辑</button>
          </div>
        </div>

      <div class="imagine-top-grid">
        <div class="imagine-card imagine-card-collapsible settings-card">
          <div class="card-content" id="settingsContent">
            <div class="card-title" data-i18n="imagine.genSettings">生成设置</div>
            <div class="settings-grid">
              <div class="settings-block settings-block-prompt">
                <div class="settings-prompt">
                  <label class="field-label" for="promptInput" data-i18n="imagine.prompt">提示词</label>
                  <textarea id="promptInput" class="geist-input imagine-textarea" placeholder="描述你想要的画面，例如：未来城市霓虹雨夜，广角摄影" data-i18n-placeholder="imagine.promptPlaceholder"></textarea>
                </div>
              </div>
              <div class="settings-block settings-block-upload edit-only-section" style="display:none">
                <label class="field-label" data-i18n="imagine.editImages">编辑图片</label>
                <div id="editUploadArea" class="edit-upload-area">
                  <input id="editFileInput" type="file" accept="image/png,image/jpeg,image/webp" multiple hidden>
                  <div id="editUploadPlaceholder" class="edit-upload-placeholder">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                      <polyline points="17 8 12 3 7 8"></polyline>
                      <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <span data-i18n="imagine.editUploadHint">点击或拖拽图片到此处（最多 3 张）</span>
                  </div>
                  <div id="editPreviewGrid" class="edit-preview-grid"></div>
                </div>
              </div>
              <div class="settings-block settings-block-duo generate-only-section">
                <div class="toggle-row">
                  <div class="toggle-text">
                    <div class="toggle-title" data-i18n="imagine.autoSave">自动保存</div>
                    <div class="toggle-desc" data-i18n="imagine.autoSaveDesc">自动保存图片</div>
                  </div>
                  <label class="toggle">
                    <input id="autoDownloadToggle" type="checkbox">
                    <span class="toggle-track"></span>
                  </label>
                </div>
                <div class="toggle-row">
                  <div class="toggle-text">
                    <div class="toggle-title" data-i18n="imagine.autoFilter">自动过滤</div>
                    <div class="toggle-desc" data-i18n="imagine.autoFilterDesc">过滤不达标图片</div>
                  </div>
                  <label class="toggle">
                    <input id="autoFilterToggle" type="checkbox" checked>
                    <span class="toggle-track"></span>
                  </label>
                </div>
              </div>
              <div class="settings-block settings-block-row2">
                <div class="settings-row">
                  <div class="settings-field">
                    <label class="field-label" for="ratioSelect" data-i18n="imagine.aspectRatio">宽高比</label>
                    <select id="ratioSelect" class="geist-input">
                      <option value="2:3"  data-i18n="imagine.ratio2_3">2:3 竖图</option>
                      <option value="1:1" data-i18n="imagine.ratio1_1">1:1 方图</option>
                      <option value="3:2" data-i18n="imagine.ratio3_2">3:2 横图</option>
                      <option value="16:9" data-i18n="imagine.ratio16_9">16:9 宽屏</option>
                      <option value="9:16" selected data-i18n="imagine.ratio9_16">9:16 竖屏</option>
                    </select>
                  </div>
                  <div class="settings-field generate-only-section">
                    <label class="field-label" for="concurrentSelect" data-i18n="imagine.concurrent">并发数量</label>
                    <select id="concurrentSelect" class="geist-input">
                      <option value="1" selected data-i18n="imagine.concurrentTask1">1 个任务</option>
                      <option value="2" data-i18n="imagine.concurrentTask2">2 个任务</option>
                      <option value="3" data-i18n="imagine.concurrentTask3">3 个任务</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="settings-block settings-block-row2b settings-block-single generate-only-section">
                <div class="toggle-row toggle-row-fill">
                    <div class="toggle-text">
                      <div class="toggle-title" data-i18n="imagine.nsfwLabel">是否 NSFW</div>
                      <div class="toggle-desc" data-i18n="imagine.nsfwDesc">生成时启用 NSFW 模式</div>
                    </div>
                    <label class="toggle">
                      <input id="nsfwToggle" type="checkbox">
                      <span class="toggle-track"></span>
                    </label>
                </div>
              </div>
              <div class="settings-block settings-block-row3 generate-only-section">
                <div class="settings-row">
                  <div class="settings-field">
                    <label class="field-label" data-i18n="imagine.genCount">生成数量</label>
                    <select id="genCountSelect" class="geist-input">
                      <option value="10" data-i18n="imagine.genCount10">10 张</option>
                      <option value="20" data-i18n="imagine.genCount20">20 张</option>
                      <option value="30" data-i18n="imagine.genCount30">30 张</option>
                      <option value="40" data-i18n="imagine.genCount40">40 张</option>
                      <option value="50" data-i18n="imagine.genCount50">50 张</option>
                    </select>
                  </div>
                  <div class="settings-folder">
                    <label class="field-label" data-i18n="imagine.saveLocation">保存位置</label>
                    <button id="selectFolderBtn" class="geist-button-outline folder-select-btn" disabled>
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                      </svg>
                      <span id="folderPath" data-i18n="imagine.browserDefault">浏览器默认位置</span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="imagine-card imagine-card-collapsible">
          <div class="status-header-row" id="statusToggle">
            <div class="card-title" data-i18n="imagine.connectionStatus">连接状态</div>
            <span id="statusText" class="status-text" data-i18n="common.notConnected">未连接</span>
            <svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="card-content" id="statusContent">
            <div class="meta-grid">
            <div class="meta-item mode-item">
              <div class="meta-label" data-i18n="imagine.connectionMode">连接模式</div>
              <div class="mode-switch" role="group" aria-label="Connection mode" data-i18n-aria-label="imagine.connectionModeAria">
                <button class="mode-btn" data-mode="auto" type="button">Auto</button>
                <button class="mode-btn" data-mode="ws" type="button">WS</button>
                <button class="mode-btn" data-mode="sse" type="button">SSE</button>
              </div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="imagine.imageCount">图片数量</div>
              <div id="countValue" class="meta-value">0</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="imagine.activeTasks">活跃任务</div>
              <div id="activeValue" class="meta-value">0</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="imagine.avgTime">平均耗时</div>
              <div id="latencyValue" class="meta-value">-</div>
            </div>
            </div>
          </div>
        </div>
      </div>

      <div class="imagine-card" style="overflow: hidden;">
        <div class="waterfall-header">
          <div class="card-title" data-i18n="imagine.gallery">瀑布流</div>
          <div class="waterfall-actions">
          </div>
        </div>
        <div id="emptyState" class="imagine-empty">
          <div class="empty-title" data-i18n="imagine.waitingTitle">等待连接中</div>
          <div class="empty-subtitle" data-i18n="imagine.waitingSubtitle">启动任务后，生成的图片会自动汇聚到这里</div>
        </div>
        <div id="waterfall" class="waterfall"></div>
      </div>
  </main>

  <!-- 图片放大预览 -->
  <div id="lightbox" class="image-lightbox">
    <button class="lightbox-close" id="closeLightbox">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <div id="floatingActions" class="floating-actions">
    <button id="startBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3" />
      </svg>
      <span data-i18n="imagine.start">开始</span>
    </button>
    <button id="stopBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100 hidden">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="5" y="5" width="14" height="14" />
      </svg>
      <span data-i18n="common.stop">停止</span>
    </button>
    <span class="toolbar-sep"></span>
    <button id="clearBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-red-100">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
      <span data-i18n="cache.clear">清空</span>
    </button>
    <span class="toolbar-sep"></span>
    <button id="batchDownloadBtn" class="batch-download-btn geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100" title="批量下载" data-i18n-title="imagine.batchDownloadTitle">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      <span data-i18n="imagine.batch">批量</span>
    </button>
    <div id="selectionToolbar" class="selection-toolbar hidden">
      <button id="toggleSelectAllBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100" data-i18n="imagine.selectAll">全选</button>
      <button id="downloadSelectedBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100"><span data-i18n="imagine.download">下载</span> <span id="selectedCount" class="selected-count">0</span></button>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.6.2"></script>
  <script src="/static/common/js/function-header.js?v=1.6.2"></script>
  <script src="/static/common/js/footer.js?v=1.6.2"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="/static/function/js/imagine.js?v=1.6.2"></script>
</body>

</html>
