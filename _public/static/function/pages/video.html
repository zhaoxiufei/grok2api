<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="video.pageTitle">Grok2API - Video 视频生成</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/static/common/css/common.css?v=1.6.2" rel="stylesheet">
  <link href="/static/function/css/video.css?v=1.6.2" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <main class="flex-1 container mx-auto max-w-5xl px-6 py-8 fade-in">
    <div class="space-y-6">
      <div class="video-header-row">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight" data-i18n="video.title">Video 视频生成</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm" data-i18n="video.subtitle">生成短视频，支持参考图与多种预设风格。</p>
        </div>
      </div>

      <div class="h-px bg-[var(--border)]"></div>

      <div class="video-top-grid">
        <div class="video-card">
          <div class="card-title" data-i18n="video.genSettings">生成设置</div>
          <div class="settings-grid">
            <div class="settings-block prompt-block">
              <label class="field-label" for="promptInput" data-i18n="video.prompt">提示词</label>
              <textarea id="promptInput" class="geist-input video-textarea" placeholder="例如：街头霓虹雨夜，慢镜头，胶片质感" data-i18n-placeholder="video.promptPlaceholder"></textarea>
            </div>
            <div class="settings-block ref-block">
              <label class="field-label" data-i18n="video.referenceImage">参考图</label>
              <div id="refUploadArea" class="ref-upload-area">
                <input id="imageFileInput" type="file" accept="image/*" hidden>
                <div id="refUploadPlaceholder" class="ref-upload-placeholder">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                  </svg>
                  <span data-i18n="video.refUploadHint">点击或拖拽参考图到此处</span>
                </div>
                <div id="refPreviewGrid" class="ref-preview-grid"></div>
              </div>
            </div>
            <div class="settings-block ratio-block">
              <label class="field-label" for="ratioSelect" data-i18n="video.aspectRatio">画面比例</label>
              <select id="ratioSelect" class="geist-input">
                <option value="3:2" data-i18n="video.ratio3_2">3:2 横构图</option>
                <option value="2:3" data-i18n="video.ratio2_3">2:3 竖构图</option>
                <option value="16:9" data-i18n="video.ratio16_9">16:9 宽屏</option>
                <option value="9:16" selected data-i18n="video.ratio9_16">9:16 竖屏</option>
                <option value="1:1" data-i18n="video.ratio1_1">1:1 方形</option>
              </select>
            </div>
            <div class="settings-block length-block">
              <label class="field-label" for="lengthSelect" data-i18n="video.duration">视频时长</label>
              <input id="lengthSelect" class="geist-input" type="number" min="6" max="30" step="1" value="6" />
            </div>
            <div class="settings-block resolution-block">
              <label class="field-label" for="resolutionSelect" data-i18n="video.resolution">分辨率</label>
              <select id="resolutionSelect" class="geist-input">
                <option value="480p">480p</option>
                <option value="720p" selected>720p</option>
              </select>
            </div>
            <div class="settings-block preset-block">
              <label class="field-label" for="presetSelect" data-i18n="video.stylePreset">风格预设</label>
              <select id="presetSelect" class="geist-input">
                <option value="normal" selected>Normal</option>
                <option value="fun">Fun</option>
                <option value="spicy">Spicy</option>
                <option value="custom">Custom</option>
              </select>
            </div>
            <div class="settings-block count-block">
              <label class="field-label" for="genCountSelect" data-i18n="video.genCount">生成数量</label>
              <select id="genCountSelect" class="geist-input">
                <option value="1" data-i18n="video.genCount1">1 个</option>
                <option value="10" selected data-i18n="video.genCount10">10 个</option>
                <option value="20" data-i18n="video.genCount20">20 个</option>
                <option value="30" data-i18n="video.genCount30">30 个</option>
                <option value="40" data-i18n="video.genCount40">40 个</option>
                <option value="50" data-i18n="video.genCount50">50 个</option>
              </select>
            </div>
            <div class="settings-block concurrent-block">
              <label class="field-label" for="concurrentSelect" data-i18n="video.concurrent">并发数量</label>
              <select id="concurrentSelect" class="geist-input">
                <option value="1" data-i18n="video.concurrentTask1">1 个任务</option>
                <option value="5" data-i18n="video.concurrentTask5">5 个任务</option>
                <option value="10" selected data-i18n="video.concurrentTask10">10 个任务</option>
                <option value="20" data-i18n="video.concurrentTask20">20 个任务</option>
              </select>
            </div>
          </div>
        </div>

        <div class="video-card">
          <div class="status-header">
            <div class="card-title" data-i18n="video.runStatus">运行状态</div>
            <span id="statusText" class="status-text" data-i18n="common.notConnected">未连接</span>
          </div>
            <div class="progress-wrap">
              <div id="progressBar" class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
              </div>
              <div class="progress-meta">
                <span id="progressText">0%</span>
                <span id="durationValue" data-i18n="video.elapsedTimeNone">耗时 -</span>
            </div>
          </div>
          <div class="meta-grid">
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.metaRatio">比例</div>
              <div id="aspectValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.metaDuration">时长</div>
              <div id="lengthValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.metaResolution">分辨率</div>
              <div id="resolutionValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.metaPreset">预设</div>
              <div id="presetValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.videoCount">视频数量</div>
              <div id="countValue" class="meta-value">-</div>
            </div>
            <div class="meta-item">
              <div class="meta-label" data-i18n="video.activeWorkers">活跃任务</div>
              <div id="activeValue" class="meta-value">-</div>
            </div>
          </div>
        </div>
      </div>

      <div class="video-card" style="overflow: hidden;">
        <div class="waterfall-header">
          <div class="card-title" data-i18n="video.gallery">视频瀑布流</div>
          <div class="waterfall-actions"></div>
        </div>
        <div id="videoEmpty" class="video-empty">
          <div class="empty-title" data-i18n="video.waitingTitle">等待生成中</div>
          <div class="empty-subtitle" data-i18n="video.waitingSubtitle">启动任务后，生成的视频会自动显示在这里</div>
        </div>
        <div id="videoWaterfall" class="video-waterfall"></div>
      </div>
    </div>
  </main>

  <!-- 视频灯箱 -->
  <div id="videoLightbox" class="video-lightbox">
    <button class="lightbox-close" id="closeVideoLightbox">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="videoLightboxPrev">&lsaquo;</button>
    <button class="lightbox-nav lightbox-next" id="videoLightboxNext">&rsaquo;</button>
    <video id="videoLightboxPlayer" controls preload="metadata"></video>
  </div>

  <!-- 浮动工具栏 -->
  <div id="floatingActions" class="floating-actions">
    <button id="startBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3" />
      </svg>
      <span data-i18n="video.start">开始</span>
    </button>
    <button id="stopBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100 hidden">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="5" y="5" width="14" height="14" />
      </svg>
      <span data-i18n="common.stop">停止</span>
    </button>
    <span class="toolbar-sep"></span>
    <button id="clearBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-red-100">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
      <span data-i18n="video.clearPreview">清空</span>
    </button>
    <span class="toolbar-sep"></span>
    <button id="batchDownloadBtn" class="batch-download-btn geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100" title="批量下载" data-i18n-title="video.batchDownloadTitle">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      <span data-i18n="video.batch">批量</span>
    </button>
    <div id="selectionToolbar" class="selection-toolbar hidden">
      <button id="toggleSelectAllBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100" data-i18n="video.selectAll">全选</button>
      <button id="downloadSelectedBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100"><span data-i18n="imagine.download">下载</span> <span id="selectedCountBadge" class="selected-count">0</span></button>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.6.2"></script>
  <script src="/static/common/js/function-header.js?v=1.6.2"></script>
  <script src="/static/common/js/footer.js?v=1.6.2"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/function/js/video.js?v=1.6.2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>

</html>
