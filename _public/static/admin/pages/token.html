<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="token.pageTitle">Grok2API - Token 管理</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/static/common/css/common.css?v=1.6.2" rel="stylesheet">
  <link href="/static/admin/css/token.css?v=1.6.2" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <!-- Main Content -->
  <main class="space-y-6 flex-1 container mx-auto max-w-5xl px-6 py-8 fade-in">

    <div class="space-y-6">
      <div class="flex justify-between items-center">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight" data-i18n="token.title">Token 列表</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm" data-i18n="token.subtitle">管理 Grok2API 的 Token 服务号池。</p>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="openImportModal()" class="geist-button-outline gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span data-i18n="token.import">导入</span>
          </button>
          <button onclick="addToken()" class="geist-button gap-2">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12h14" />
            </svg>
            <span data-i18n="token.add">添加</span>
          </button>
        </div>
      </div>

      <div class="h-px bg-[var(--border)] my-6"></div>

      <!-- Statistics -->
      <div class="grid grid-cols-4 gap-4 mb-6" id="stats-container">
        <!-- Row 1 -->
        <div class="stat-card">
          <div class="stat-value" id="stat-total">-</div>
          <div class="stat-label" data-i18n="token.statTotal">Token 总数</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-green-600" id="stat-active">-</div>
          <div class="stat-label" data-i18n="token.statActive">Token 正常</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-orange-500" id="stat-cooling">-</div>
          <div class="stat-label" data-i18n="token.statCooling">Token 限流</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-red-600" id="stat-invalid">-</div>
          <div class="stat-label" data-i18n="token.statInvalid">Token 失效</div>
        </div>

        <!-- Row 2 -->
        <div class="stat-card">
          <div class="stat-value" id="stat-chat-quota">-</div>
          <div class="stat-label" data-i18n="token.statChatQuota">Chat 剩余</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-blue-600" id="stat-image-quota">-</div>
          <div class="stat-label" data-i18n="token.statImageQuota">Image 剩余</div>
        </div>
        <div class="stat-card">
          <div class="stat-value text-gray-400" id="stat-video-quota" data-i18n="token.statVideoUnavailable">无法统计</div>
          <div class="stat-label" data-i18n="token.statVideoQuota">Video 剩余</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-total-calls">-</div>
          <div class="stat-label" data-i18n="token.statTotalCalls">总调用次数</div>
        </div>
      </div>

      <!-- Tab Filter (with ARIA) -->
      <div class="flex items-center gap-4 mb-4 border-b border-[var(--border)] overflow-x-auto hide-scrollbar"
           role="tablist" aria-label="Token 状态筛选" data-i18n-aria-label="token.statusFilterAria" id="status-tabs">
        <button class="tab-item active" role="tab" aria-selected="true"
                data-filter="all" onclick="filterByStatus('all')">
          <span data-i18n="token.tabAll">全部</span> <span class="badge" id="tab-count-all">0</span>
        </button>
        <button class="tab-item" role="tab" aria-selected="false"
                data-filter="active" onclick="filterByStatus('active')">
          <span data-i18n="token.tabActive">正常</span> <span class="badge badge-green" id="tab-count-active">0</span>
        </button>
        <button class="tab-item" role="tab" aria-selected="false"
                data-filter="cooling" onclick="filterByStatus('cooling')">
          <span data-i18n="token.tabCooling">限流</span> <span class="badge badge-orange" id="tab-count-cooling">0</span>
        </button>
        <button class="tab-item" role="tab" aria-selected="false"
                data-filter="expired" onclick="filterByStatus('expired')">
          <span data-i18n="token.tabExpired">失效</span> <span class="badge badge-red" id="tab-count-expired">0</span>
        </button>
        <span class="tab-sep"></span>
        <button class="tab-item" role="tab" aria-selected="false"
                data-filter="nsfw" onclick="filterByStatus('nsfw')">
          <span data-i18n="token.tabNsfw">已开 NSFW</span> <span class="badge badge-purple" id="tab-count-nsfw">0</span>
        </button>
        <button class="tab-item" role="tab" aria-selected="false"
                data-filter="no-nsfw" onclick="filterByStatus('no-nsfw')">
          <span data-i18n="token.tabNoNsfw">未开 NSFW</span> <span class="badge badge-gray" id="tab-count-no-nsfw">0</span>
        </button>
      </div>

      <div class="token-table-shell rounded-lg overflow-hidden bg-white mb-4">
        <!-- Pagination -->
        <div class="pagination-bar">
          <div class="pagination-left">
            <button id="page-prev" type="button" class="pagination-icon-btn" onclick="goPrevPage()" aria-label="上一页">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </button>
            <div id="pagination-info" class="pagination-info">第 0 / 0 页 · 共 0 条</div>
            <button id="page-next" type="button" class="pagination-icon-btn" onclick="goNextPage()" aria-label="下一页">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>
          <div class="pagination-right">
            <div id="select-all-wrap" class="select-menu-wrap">
              <button id="select-all-trigger" type="button" class="pagination-action-btn" onclick="handleSelectAllPrimary(event)">
                <span id="select-all-label" data-i18n="common.selectAll">全选</span>
                <svg id="select-all-caret" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </button>
              <div id="select-all-popover" class="select-all-popover hidden">
                <button type="button" class="select-all-option" onclick="selectVisibleAllFromMenu()" data-i18n="token.selectPage">全选本页</button>
                <button type="button" class="select-all-option" onclick="selectAllFilteredFromMenu()" data-i18n="token.selectAllFiltered">全选全部</button>
              </div>
            </div>
            <select id="page-size" class="pagination-size-select" onchange="changePageSize()">
              <option value="20">20 / 页</option>
              <option value="50" selected>50 / 页</option>
              <option value="100">100 / 页</option>
              <option value="200">200 / 页</option>
              <option value="500">500 / 页</option>
              <option value="1000">1000 / 页</option>
              <option value="2000">2000 / 页</option>
            </select>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table class="geist-table min-w-[860px]">
            <thead>
              <tr>
                <th class="w-10"><input type="checkbox" id="select-all" class="checkbox" onclick="toggleSelectAll()"></th>
                <th class="w-56 text-left" data-i18n="token.tableToken">Token</th>
                <th class="w-24" data-i18n="token.tableType">类型</th>
                <th class="w-24" data-i18n="token.tableStatus">状态</th>
                <th class="w-20" id="th-quota" data-i18n="token.tableQuota">额度</th>
                <th class="text-left" data-i18n="token.tableNote">备注</th>
                <th class="w-44 text-center" data-i18n="token.tableActions">操作</th>
              </tr>
            </thead>
            <tbody id="token-table-body">
              <!-- Dynamic Rows -->
            </tbody>
          </table>
        </div>
        <div id="loading" class="text-center py-12 text-[var(--accents-4)]" data-i18n="common.loading">加载中...</div>
        <div id="empty-state" class="hidden table-empty" data-i18n="token.emptyState">
          暂无 Token，请点击右上角导入或添加。
        </div>
      </div>

      <!-- Batch Actions Bar (Floating Bottom) -->

    </div>
  </main>
  <div id="app-footer"></div>

  <!-- Batch Actions Bar (Floating Bottom) -->
  <div id="batch-actions"
    class="fixed bottom-8 left-1/2 -translate-x-1/2 z-20 bg-white border border-[var(--border)] rounded-full px-3 py-2 flex items-center shadow-lg gap-3 cursor-move select-none active:cursor-grabbing whitespace-nowrap">
    <div class="text-sm font-medium flex items-center gap-2">
      <span class="text-[var(--accents-5)] text-xs" data-i18n="common.selected">已选择</span>
      <span class="bg-black text-white text-xs px-1.5 py-0.5 rounded-full" id="selected-count">0</span>
      <span class="text-[var(--accents-5)] text-xs" data-i18n="common.items">项</span>
    </div>
    <span class="toolbar-sep"></span>
    <div class="flex items-center gap-1">
      <button id="btn-batch-export" onclick="batchExport()"
        class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100" data-i18n="token.batchExport">
        导出
      </button>
      <button id="btn-batch-update" onclick="batchUpdate()"
        class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100 justify-center" data-i18n="token.batchRefresh">
        刷新
      </button>
      <button id="btn-batch-disable" onclick="batchDisableTokens()"
        class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100 justify-center" data-i18n="token.batchDisable">
        禁用
      </button>
      <button id="btn-batch-enable" onclick="batchEnableTokens()"
        class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100 justify-center" data-i18n="token.batchEnable">
        启用
      </button>
      <button id="btn-batch-nsfw" onclick="batchEnableNSFW()"
        class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100 justify-center" disabled>
        NSFW
      </button>
      <button id="btn-batch-delete" onclick="batchDelete()" class="geist-button-danger text-xs px-3" data-i18n="token.batchDelete">
        删除
      </button>
    </div>
    <div id="batch-progress" class="hidden text-xs text-[var(--accents-5)] flex items-center gap-2">
      <span class="toolbar-sep"></span>
      <span id="batch-progress-text"></span>
      <button id="btn-pause-action" type="button" class="batch-link hidden" onclick="toggleBatchPause()" data-i18n="common.pause">暂停</button>
      <button id="btn-stop-action" type="button" class="batch-link hidden" onclick="stopBatchRefresh()" data-i18n="common.stop">终止</button>
    </div>
  </div>


  <!-- Import Modal -->
  <div id="import-modal" class="modal-overlay hidden">
    <div class="modal-content modal-lg" id="import-modal-content">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="token.importTitle">批量导入 Token</h3>
        <button onclick="closeImportModal()" class="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="space-y-4">
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.importTargetPool">目标 Pool</label>
          <select id="import-pool" class="geist-input">
            <option value="ssoBasic">ssoBasic</option>
            <option value="ssoSuper">ssoSuper</option>
          </select>
        </div>
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.importTokenList">Token 列表 (每行一个)</label>
          <textarea id="import-text" class="geist-input font-mono h-48"
            placeholder="粘贴 Token，一行一个..." data-i18n-placeholder="token.importPlaceholder"></textarea>
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button onclick="closeImportModal()" class="geist-button-outline text-xs px-3" data-i18n="common.cancel">取消</button>
          <button onclick="submitImport()" class="geist-button text-xs px-3" data-i18n="token.startImport">开始导入</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-content modal-md" id="edit-modal-content">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="token.editTitle">编辑 Token</h3>
        <button onclick="closeEditModal()" class="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="space-y-4">
        <input type="hidden" id="edit-original-token">
        <input type="hidden" id="edit-original-pool">
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.tableToken">Token</label>
          <input type="text" id="edit-token-display" class="geist-input font-mono bg-gray-50 text-gray-500"
            disabled>
        </div>
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.editType">类型</label>
          <select id="edit-pool" class="geist-input">
            <option value="ssoBasic">ssoBasic</option>
            <option value="ssoSuper">ssoSuper</option>
          </select>
        </div>
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.editQuota">额度</label>
          <input type="number" id="edit-quota" class="geist-input" min="0">
        </div>
        <div>
          <label class="modal-label mb-1 block" data-i18n="token.editNote">备注</label>
          <input type="text" id="edit-note" class="geist-input" placeholder="可选备注" data-i18n-placeholder="token.editNotePlaceholder" maxlength="50">
        </div>
        <div class="flex justify-end gap-2 pt-2">
          <button onclick="closeEditModal()" class="geist-button-outline text-xs px-3" data-i18n="common.cancel">取消</button>
          <button onclick="saveEdit()" class="geist-button text-xs px-3" data-i18n="common.save">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div id="confirm-dialog" class="modal-overlay confirm-dialog hidden">
    <div class="modal-content modal-md">
      <div class="confirm-dialog-body">
        <div class="confirm-dialog-title" data-i18n="common.pleaseConfirm">请确认</div>
        <div id="confirm-message" class="confirm-dialog-message"></div>
        <div class="confirm-dialog-actions">
          <button id="confirm-cancel" type="button" class="geist-button-outline text-xs px-3" data-i18n="common.cancel">取消</button>
          <button id="confirm-ok" type="button" class="geist-button-danger text-xs px-3" data-i18n="common.ok">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/common/js/draggable.js"></script>
  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.6.2"></script>
  <script src="/static/common/js/batch-sse.js?v=1.6.2"></script>
  <script src="/static/common/js/header.js?v=1.6.2"></script>
  <script src="/static/common/js/footer.js?v=1.6.2"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/admin/js/token.js?v=1.6.2"></script>
</body>

</html>
