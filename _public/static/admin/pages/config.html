<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="config.pageTitle">Grok2API - 配置管理</title>
  <link rel="icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>


  <link href="/static/common/css/common.css?v=1.6.1" rel="stylesheet">
  <link href="/static/admin/css/config.css?v=1.6.1" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">

  <div id="app-header"></div>

  <main class="space-y-6 flex-1 container mx-auto max-w-5xl px-6 py-8 fade-in">
    <div class="space-y-6">
      <div class="flex justify-between items-center">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight" data-i18n="config.title">配置管理</h2>
          <p class="text-[var(--accents-4)] mt-1 text-sm" data-i18n="config.subtitle">管理 API 密钥及系统参数设置。</p>
        </div>
        <button onclick="saveConfig()" id="save-btn" class="geist-button gap-2">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          <span data-i18n="common.save">保存</span>
        </button>
      </div>

      <div class="h-px bg-[var(--border)] my-6"></div>

      <div id="config-container" class="space-y-8">
        <div class="text-center py-12 text-[var(--accents-4)]" data-i18n="common.loading">加载中...</div>
      </div>

    </div>
  </main>
  <div id="app-footer"></div>

  <script src="/static/i18n/i18n.js"></script>
  <script src="/static/common/js/admin-auth.js?v=1.6.1"></script>
  <script src="/static/common/js/header.js?v=1.6.1"></script>
  <script src="/static/common/js/footer.js?v=1.6.1"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/admin/js/config.js?v=1.6.1"></script>
</body>

</html>
