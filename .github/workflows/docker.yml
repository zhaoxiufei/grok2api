name: Build Docker Image

on:
  push:
    branches:
      - stable
    tags:
      - 'v*'
  pull_request:
    branches:
      - stable

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # AMD64 平台
          - platform: linux/amd64
            suffix: amd64
          # ARM64 平台
#          - platform: linux/arm64
#            suffix: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 分支推送
            type=ref,event=branch,suffix=-${{ matrix.suffix }}
            # 语义化版本：完整版本号
            type=semver,pattern={{version}},suffix=-${{ matrix.suffix }}
            # latest标签
            type=raw,value=latest-${{ matrix.suffix }},enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}
          pull: true
  
  merge-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Create and push manifest
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          for tag in $TAGS; do
            echo "合并标签: $tag"
            docker buildx imagetools create -t $tag \
              ${tag}-amd64 \
              ${tag}-arm64
          done

  notify:
    runs-on: ubuntu-latest
    needs: [build-and-push, merge-manifests]
    if: always()

    steps:
      - name: Bark 推送构建通知
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ] && [ "${{ needs.merge-manifests.result }}" = "success" ]; then
            STATUS="✅ 构建成功"
          elif [ "${{ needs.merge-manifests.result }}" = "skipped" ] && [ "${{ needs.build-and-push.result }}" = "success" ]; then
            STATUS="✅ 构建成功(PR)"
          else
            STATUS="❌ 构建失败"
          fi
          MESSAGE="${STATUS} ${GITHUB_REPOSITORY} @${GITHUB_REF_NAME}"
          ENCODED_MESSAGE=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${MESSAGE}'))")
          curl -sS -o /dev/null -w "%{http_code}" \
            "https://api.day.app/${{ secrets.BARK_KEY }}/${ENCODED_MESSAGE}?group=grok2api"