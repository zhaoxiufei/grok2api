<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - Public</title>
  <link rel="icon" href="/static/common/img/favicon/favicon.ico">
  <link href="/static/common/css/tailwind.css?v=1.7.0" rel="stylesheet">
  <link href="/static/common/css/common.css?v=1.5.0" rel="stylesheet">
  <link href="/static/common/css/login.css?v=1.5.0" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="login-body">
  <div class="login-bg" aria-hidden="true"></div>

  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <a href="https://github.com/WangXingFan/grok2api" target="_blank" rel="noopener" class="login-brand-link">
          <svg class="login-github-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 2C6.48 2 2 6.58 2 12.26c0 4.5 2.87 8.32 6.84 9.67.5.1.68-.22.68-.48 0-.24-.01-.86-.01-1.69-2.78.62-3.37-1.37-3.37-1.37-.45-1.17-1.11-1.48-1.11-1.48-.91-.64.07-.63.07-.63 1.01.07 1.54 1.06 1.54 1.06.9 1.58 2.36 1.12 2.94.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.04 1.03-2.76-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05A9.3 9.3 0 0 1 12 6.79c.85 0 1.7.12 2.5.36 1.9-1.32 2.74-1.05 2.74-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.64 1.03 2.76 0 3.94-2.34 4.81-4.58 5.06.36.32.68.95.68 1.92 0 1.38-.01 2.49-.01 2.83 0 .26.18.58.69.48A10.05 10.05 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z" />
          </svg>
          <span>Grok2API</span>
        </a>
      </div>
      <div class="login-title">Public Access</div>
      <div class="login-subtitle">请输入 Public Key 以继续</div>

      <div class="login-form">
        <input type="password" id="public-key-input" placeholder="Public Key" class="geist-input login-input">
        <button onclick="login()" class="geist-button login-button">进入</button>
      </div>

      <div id="oauth-section" class="hidden mt-4" style="width:100%;">
        <div class="flex items-center gap-2 mb-3">
          <div class="flex-1 h-px bg-[var(--accents-2)]"></div>
          <span class="text-xs text-[var(--accents-4)]">或</span>
          <div class="flex-1 h-px bg-[var(--accents-2)]"></div>
        </div>
        <button id="linuxdo-login-btn" onclick="loginWithLinuxDo()" class="geist-button login-button" style="width:100%;background:#f90;color:#fff;border:none;display:flex;align-items:center;justify-content:center;gap:6px;">
          <svg width="18" height="18" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
            <path d="M18 36C27.9411 36 36 27.9411 36 18C36 8.05887 27.9411 0 18 0C8.05887 0 0 8.05887 0 18C0 27.9411 8.05887 36 18 36Z" fill="white"/>
            <path d="M7.2 10.8C8.6 14.4 11.8 19.6 18 21.6C24.2 19.6 27.4 14.4 28.8 10.8C28.8 10.8 28.8 25.2 18 28.8C7.2 25.2 7.2 10.8 7.2 10.8Z" fill="#f90"/>
          </svg>
          <span>使用 LINUX DO 登录</span>
        </button>
      </div>

      <div class="mt-3 text-xs text-[var(--accents-4)]">
        <a href="/admin/login" class="hover:text-black">进入管理后台</a>
      </div>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="/static/common/js/admin-auth.js?v=1.5.0"></script>
  <script src="/static/common/js/toast.js?v=1.6.0"></script>
  <script src="/static/common/js/footer.js?v=1.5.0"></script>
  <script src="/static/public/js/login.js?v=1.5.0"></script>
</body>

</html>
