<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok2API - Video 视频生成</title>
  <link rel="icon" href="/static/common/img/favicon/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-mono/style.css" rel="stylesheet">
  <link href="/static/common/css/common.css?v=1.5.0" rel="stylesheet">
  <link href="/static/public/css/video.css?v=1.5.0" rel="stylesheet">
  <link href="/static/common/css/toast.css" rel="stylesheet">
</head>

<body class="min-h-screen flex flex-col" style="background-color: var(--bg);">
  <div id="toast-container" class="toast-container"></div>
  <div id="app-header"></div>

  <main class="flex-1 container mx-auto max-w-5xl px-6 py-8 fade-in">
    <div class="space-y-6">
      <div>
        <h2 class="text-2xl font-semibold tracking-tight">Video 视频生成</h2>
        <p class="text-[var(--accents-4)] mt-1 text-sm">通过 Grok 生成短视频，支持多种宽高比、时长和风格预设。</p>
      </div>

      <div class="h-px bg-[var(--border)]"></div>

      <!-- ===== 单视频模式：顶部双列网格 ===== -->
      <div class="video-top-grid" id="videoTopGrid">
        <!-- 左列：设置卡片 (可折叠) -->
        <div class="video-card video-card-collapsible" id="singleSettings">
          <div class="status-header-row" data-collapse-toggle>
            <div class="card-title">生成设置</div>
            <svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="card-content">
            <div class="settings-layout">
              <!-- 模式切换 (单视频/瀑布流) -->
              <div class="mode-toggle" id="videoModeToggle">
                <button class="mode-toggle-btn active" data-mode="single">单视频</button>
                <button class="mode-toggle-btn" data-mode="waterfall">瀑布流</button>
              </div>
              <div class="settings-top">
                <div class="settings-prompt">
                  <label class="field-label" for="promptInput">提示词</label>
                  <textarea id="promptInput" class="geist-input video-textarea"
                    placeholder="描述你想要的视频画面，例如：一只猫在草地上奔跑，阳光明媚"></textarea>
                  <div style="margin-top:16px;">
                    <label class="field-label">参考图片 <span style="font-weight:400;color:var(--accents-4);">（可选，上传后将基于图片生成视频）</span></label>
                    <div id="imageUploadArea" class="video-upload-area">
                      <input type="file" id="imageFileInput" accept="image/*" style="display:none;">
                      <div id="imageUploadPlaceholder" class="video-upload-placeholder">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accents-3);">
                          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                          <circle cx="8.5" cy="8.5" r="1.5"></circle>
                          <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span>点击或拖拽上传图片</span>
                      </div>
                      <div id="imagePreviewContainer" class="video-upload-preview hidden">
                        <img id="imagePreview" alt="preview">
                        <button id="imageRemoveBtn" class="video-upload-remove" title="移除图片">&times;</button>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="settings-options">
                  <div>
                    <label class="field-label" for="ratioSelect">宽高比</label>
                    <select id="ratioSelect" class="geist-input">
                      <option value="3:2">3:2 横向</option>
                      <option value="16:9">16:9 宽屏</option>
                      <option value="1:1">1:1 方形</option>
                      <option value="2:3">2:3 竖向</option>
                      <option value="9:16" selected>9:16 竖屏</option>
                    </select>
                  </div>
                  <div>
                    <label class="field-label" for="lengthSelect">视频时长</label>
                    <select id="lengthSelect" class="geist-input">
                      <option value="6" selected>6 秒</option>
                      <option value="10">10 秒</option>
                      <option value="15">15 秒</option>
                    </select>
                  </div>
                  <div>
                    <label class="field-label" for="resolutionSelect">分辨率</label>
                    <select id="resolutionSelect" class="geist-input">
                      <option value="480p">480p</option>
                      <option value="720p" selected>720p</option>
                    </select>
                  </div>
                  <div>
                    <label class="field-label" for="presetSelect">风格预设</label>
                    <select id="presetSelect" class="geist-input">
                      <option value="custom" selected>Custom 自定义</option>
                      <option value="normal">Normal 普通</option>
                      <option value="fun">Fun 趣味</option>
                      <option value="spicy">Spicy 辛辣</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="settings-toggles">
                <div class="settings-toggle">
                  <label class="field-label" for="streamToggle">流式输出</label>
                  <label class="toggle">
                    <input id="streamToggle" type="checkbox" checked>
                    <span class="toggle-track"></span>
                    <span class="toggle-label">实时获取生成进度</span>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 右列：状态卡片 (可折叠) -->
        <div class="video-card video-card-collapsible" id="videoStatusCard">
          <div class="status-header-row" data-collapse-toggle>
            <div class="card-title">生成状态</div>
            <span id="statusText" class="status-text">就绪</span>
            <svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="card-content">
            <div class="meta-grid">
              <div class="meta-item">
                <div class="meta-label">模型</div>
                <div class="meta-value">video</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">宽高比</div>
                <div id="statusRatio" class="meta-value">9:16</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">时长</div>
                <div id="statusLength" class="meta-value">6s</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">分辨率</div>
                <div id="statusResolution" class="meta-value">720p</div>
              </div>
              <div class="meta-item">
                <div class="meta-label">预设</div>
                <div id="statusPreset" class="meta-value">custom</div>
              </div>
            </div>

            <!-- 生成历史 -->
            <div class="status-header-row" style="margin-top:16px; cursor:default;">
              <div class="card-title">生成历史</div>
              <span style="flex:1;"></span>
              <button id="historyToggleBtn" class="geist-button-outline text-xs px-3 hidden" style="height:24px;padding:0 8px;font-size:11px;">展开全部</button>
              <button id="clearHistoryBtn" class="geist-button-outline text-xs px-3" style="height:24px;padding:0 8px;font-size:11px;">清空</button>
            </div>
            <div id="historyEmpty" class="video-hint">暂无生成记录</div>
            <div id="historyList" class="video-history-list"></div>
          </div>
        </div>
      </div>

      <!-- ===== 单视频模式：视频预览卡片 (全宽) ===== -->
      <div class="video-card" id="singlePreview">
        <div class="card-title" style="margin-bottom:12px;">视频预览</div>
        <div id="videoEmpty" class="video-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
            stroke-linecap="round" stroke-linejoin="round" style="color: var(--accents-3); margin-bottom: 12px;">
            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
            <line x1="7" y1="2" x2="7" y2="22"></line>
            <line x1="17" y1="2" x2="17" y2="22"></line>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <line x1="2" y1="7" x2="7" y2="7"></line>
            <line x1="2" y1="17" x2="7" y2="17"></line>
            <line x1="17" y1="17" x2="22" y2="17"></line>
            <line x1="17" y1="7" x2="22" y2="7"></line>
          </svg>
          <div class="empty-title">等待生成</div>
          <div class="empty-subtitle">输入提示词并点击"生成视频"开始</div>
        </div>
        <div id="videoProgress" class="video-progress hidden">
          <div class="video-progress-bar">
            <div id="progressFill" class="video-progress-fill"></div>
          </div>
          <div id="progressText" class="video-progress-text">准备中...</div>
        </div>
        <div id="videoPlayer" class="video-player-wrapper hidden">
          <video id="videoElement" controls playsinline></video>
        </div>
        <div id="videoHtmlContainer" class="video-html-container hidden"></div>
        <div id="videoMeta" class="video-meta hidden">
          <span id="metaPrompt" class="video-meta-prompt"></span>
          <span id="metaElapsed" class="font-mono"></span>
        </div>
      </div>

      <!-- ===== 瀑布流模式 (默认隐藏) ===== -->
      <div id="wfSection" class="hidden">
        <div class="video-card video-card-collapsible">
          <div class="status-header-row" data-collapse-toggle>
            <div class="card-title">生成设置</div>
            <svg class="collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </div>
          <div class="card-content">
            <div class="settings-layout">
              <!-- 模式切换 -->
              <div class="mode-toggle" id="wfModeToggle">
                <button class="mode-toggle-btn" data-mode="single">单视频</button>
                <button class="mode-toggle-btn active" data-mode="waterfall">瀑布流</button>
              </div>
              <div class="settings-top">
                <div class="settings-prompt">
                  <label class="field-label" for="wfPromptInput">提示词</label>
                  <textarea id="wfPromptInput" class="geist-input video-textarea"
                    placeholder="描述你想要的视频画面，例如：一只猫在草地上奔跑，阳光明媚"></textarea>
                  <div style="margin-top:16px;">
                    <label class="field-label">参考图片 <span style="font-weight:400;color:var(--accents-4);">（可选，上传后将基于图片生成视频）</span></label>
                    <div id="wfImageUploadArea" class="video-upload-area">
                      <input type="file" id="wfImageFileInput" accept="image/*" style="display:none;">
                      <div id="wfImagePlaceholder" class="video-upload-placeholder">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accents-3);">
                          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                          <circle cx="8.5" cy="8.5" r="1.5"></circle>
                          <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <span>点击或拖拽上传图片</span>
                      </div>
                      <div id="wfImagePreviewContainer" class="video-upload-preview hidden">
                        <img id="wfImagePreview" alt="preview">
                        <button id="wfImageRemoveBtn" class="video-upload-remove" title="移除图片">&times;</button>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="settings-options">
                  <div>
                    <label class="field-label" for="wfRatio">比例</label>
                    <select id="wfRatio" class="geist-input">
                      <option value="3:2">3:2</option>
                      <option value="16:9">16:9</option>
                      <option value="1:1">1:1</option>
                      <option value="2:3">2:3</option>
                      <option value="9:16" selected>9:16</option>
                    </select>
                  </div>
                  <div>
                    <label class="field-label" for="wfLength">时长</label>
                    <select id="wfLength" class="geist-input">
                      <option value="6">6s</option>
                      <option value="10">10s</option>
                      <option value="15">15s</option>
                    </select>
                  </div>
                  <div>
                    <label class="field-label" for="wfResolution">分辨率</label>
                    <select id="wfResolution" class="geist-input">
                      <option value="480p">480p</option>
                      <option value="720p" selected>720p</option>
                    </select>
                  </div>
                  <div>
                    <label class="field-label" for="wfConcurrent">并发</label>
                    <select id="wfConcurrent" class="geist-input">
                      <option value="1">1</option>
                      <option value="2">2</option>
                      <option value="3" selected>3</option>
                      <option value="4">4</option>
                      <option value="5">5</option>
                    </select>
                  </div>
                  <div>
                    <label class="field-label" for="wfMaxCount">最多生成</label>
                    <select id="wfMaxCount" class="geist-input">
                      <option value="10">10</option>
                      <option value="20" selected>20</option>
                      <option value="30">30</option>
                      <option value="40">40</option>
                      <option value="50">50</option>
                    </select>
                  </div>
                </div>
              </div>
              <div class="settings-toggles">
                <div class="settings-toggle">
                  <label class="field-label">自动滚动</label>
                  <label class="toggle">
                    <input id="wfAutoScroll" type="checkbox" checked>
                    <span class="toggle-track"></span>
                    <span class="toggle-label">生成后自动滚动到最新</span>
                  </label>
                </div>
                <div class="settings-toggle">
                  <label class="field-label">自动下载</label>
                  <label class="toggle">
                    <input id="wfAutoDownload" type="checkbox">
                    <span class="toggle-track"></span>
                    <span class="toggle-label">生成后自动下载视频</span>
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="wfGrid" class="video-waterfall">
          <div class="wf-empty">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
              stroke-linecap="round" stroke-linejoin="round" style="color:var(--accents-3);margin-bottom:8px;">
              <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
              <line x1="7" y1="2" x2="7" y2="22"></line>
              <line x1="17" y1="2" x2="17" y2="22"></line>
              <line x1="2" y1="12" x2="22" y2="12"></line>
            </svg>
            <div class="empty-title">等待生成</div>
            <div class="empty-subtitle">输入提示词并点击"开始"批量生成</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 瀑布流 Lightbox -->
  <div id="wfLightbox" class="video-lightbox">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8249;</button>
    <video id="lightboxVideo" controls playsinline></video>
    <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8250;</button>
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>

  <!-- 浮动工具栏 (两种模式共用) -->
  <div id="wfFloatingBar" class="video-floating-bar">
    <button id="wfStartBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="5 3 19 12 5 21 5 3" />
      </svg>
      生成
    </button>
    <button id="wfStopBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100 hidden">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="5" y="5" width="14" height="14" />
      </svg>
      停止
    </button>
    <span class="toolbar-sep" id="wfClearSep"></span>
    <button id="wfClearBtn" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-red-100">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
      清空
    </button>
    <span class="toolbar-sep" id="wfBatchSep"></span>
    <button id="floatSelectAll" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 11 12 14 22 4"></polyline>
        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
      </svg>
      批量
    </button>
    <div id="selectionToolbar" class="hidden" style="display:inline-flex;align-items:center;gap:6px;">
      <button id="floatDeselectAll" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100">取消</button>
      <button id="floatDownload" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-gray-100">下载 <span id="floatCounter" class="float-counter">0</span></button>
      <button id="floatDelete" class="geist-button-outline text-xs px-3 gap-1 border-0 hover:bg-red-100">删除</button>
    </div>
  </div>

  <div id="app-footer"></div>

  <script src="/static/common/js/admin-auth.js?v=1.5.0"></script>
  <script src="/static/common/js/public-header.js?v=1.5.0"></script>
  <script src="/static/common/js/footer.js?v=1.5.0"></script>
  <script src="/static/common/js/toast.js"></script>
  <script src="/static/public/js/video.js?v=1.5.0"></script>
</body>

</html>
